name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 변경 디렉토리 감지
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            deploy:
              - 'deploy/**'

      - name: 배포 대상 구성
        id: targets
        run: |
          targets=()
          [[ "${{ steps.changes.outputs.backend }}" == "true" ]] && targets+=('"backend"')
          [[ "${{ steps.changes.outputs.frontend }}" == "true" ]] && targets+=('"frontend"')
          [[ "${{ steps.changes.outputs.deploy }}" == "true" ]] && targets+=('"deploy"')
          list=$(IFS=,; echo "[${targets[*]-}]")
          echo "list=$list" >> "$GITHUB_OUTPUT"
          echo "배포 대상: $list"

      - name: 서버 웹훅 호출
        if: steps.targets.outputs.list != '[]'
        run: |
          curl -fsS -X POST "$DEPLOY_URL" \
            -H "X-Deploy-Key: $DEPLOY_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"targets\":${{ steps.targets.outputs.list }},\"sha\":\"${{ github.sha }}\"}"
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
